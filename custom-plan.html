<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom House Plan | Jevikraft LTD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="ticker"><div class="ticker-track"><span>✦ Custom designs by architects</span><span>✦ Tailored to your land</span></div></div>

<nav><a href="index.html" class="nav-logo">JEVIKRAFT LTD</a><ul class="nav-links"><li><a href="shop.html">Shop</a></li><li><a href="custom-plan.html">Custom Plan</a></li></ul><div class="nav-icons"><a href="#" class="cart-btn">🛒 Cart (0)</a></div></nav>

<section style="max-width:900px; margin:0 auto;">
  <div style="text-align:center; margin-bottom:32px;"><p class="section-label">Bespoke Design</p><h2 class="section-title">Tell Us About Your Dream Home</h2><p class="section-sub" style="margin:0 auto;">Our architects will create a unique floor plan based on your requirements.</p></div>
  <form id="custom-plan-form" class="custom-form">
    <div class="form-group"><label>Full Name *</label><input type="text" required></div>
    <div class="form-group"><label>Email Address *</label><input type="email" required></div>
    <div class="form-group"><label>Phone (optional)</label><input type="tel"></div>
    <div class="form-group"><label>Preferred Style</label><select><option>Modern</option><option>Contemporary</option><option>Bungalow</option><option>Rustic</option><option>Traditional</option></select></div>
    <div class="form-group"><label>Number of Bedrooms</label><input type="number" min="1" max="10" value="3"></div>
    <div class="form-group"><label>Number of Bathrooms</label><input type="number" min="1" max="8" value="2"></div>
    <div class="form-group"><label>Approx. Total Area (sqm)</label><input type="number" placeholder="e.g., 200"></div>
    <div class="form-group"><label>Budget Range (USD)</label><select><option>Under $500</option><option>$500 – $1,500</option><option>$1,500 – $3,000</option><option>$3,000+</option></select></div>
    <div class="form-group"><label>Special Requirements / Notes</label><textarea rows="4" placeholder="Lot dimensions, specific rooms, etc."></textarea></div>
    <button type="submit" class="btn-primary" style="width:100%;">Request Custom Design</button>
  </form>
</section>

<footer><div class="footer-bottom"><span>© 2025 JEVIKRAFT LTD</span></div></footer>
<div class="cookie" id="cookie"><div class="cookie-btns"><button class="btn-accept">Accept</button></div></div>
<script src="js/main.js"></script>
</body>
</html>
